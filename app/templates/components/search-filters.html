<div class="position-sticky" style="top: 2rem;">
    <div class="p-4 mb-3 bg-body-tertiary rounded">
        <h5 class="fst-italic mb-3">Filter Cafés</h5>

        <div id="activeFiltersBlock" class="mb-4 {% if not (request.args.get('wifi') or request.args.get('sockets') or request.args.get('calls') or request.args.get('toilet')) %}d-none{% endif %}">

            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small fw-bold text-muted text-uppercase">Active Filters</span>
                <a href="{{ url_for('web.search', query=request.args.get('q')) }}" class="text-warning small text-decoration-none">Clear all</a>
            </div>

            <div class="d-flex flex-wrap gap-1">
                <span id="badge-wifi" class="badge text-bg-success {% if not request.args.get('wifi') %}d-none{% endif %}">Free Wi-Fi</span>

                <span id="badge-sockets" class="badge text-bg-success {% if not request.args.get('sockets') %}d-none{% endif %}">Power Sockets</span>

                <span id="badge-calls" class="badge text-bg-success {% if not request.args.get('calls') %}d-none{% endif %}">Takes Calls</span>

                <span id="badge-toilet" class="badge text-bg-success {% if not request.args.get('toilet') %}d-none{% endif %}">Restroom</span>
            </div>
            <hr class="mt-3">
        </div>

        <form id="filterForm" action="{{ url_for('web.search') }}" method="GET">

            {% if request.args.get('q') %}
                <input type="hidden" name="q" value="{{ request.args.get('q') }}">
            {% endif %}

            <div class="form-check form-switch mb-2">
                <input class="form-check-input filter-toggle" type="checkbox" role="switch" id="wifiToggle"
                       name="wifi" value="true" {% if request.args.get('wifi') %} checked {% endif %}>
                <label class="form-check-label" for="wifiToggle">Free Wi-Fi</label>
            </div>

            <div class="form-check form-switch mb-2">
                <input class="form-check-input filter-toggle" type="checkbox" role="switch" id="socketsToggle"
                       name="sockets" value="true" {% if request.args.get('sockets') %}checked{% endif %}>
                <label class="form-check-label" for="socketsToggle">Power Sockets</label>
            </div>

            <div class="form-check form-switch mb-2">
                <input class="form-check-input filter-toggle" type="checkbox" role="switch" id="callsToggle"
                       name="calls" value="true" {% if request.args.get('calls') %}checked{% endif %}>
                <label class="form-check-label" for="callsToggle">Can Take Calls</label>
            </div>

            <div class="form-check form-switch mb-3">
                <input class="form-check-input filter-toggle" type="checkbox" role="switch" id="toiletToggle"
                       name="toilet" value="true" {% if request.args.get('toilet') %}checked{% endif %}>
                <label class="form-check-label" for="toiletToggle">Restroom Available</label>
            </div>

        </form>
    </div>

    <div>
<!--        <h4 class="fst-italic">Recently Added</h4>-->
        <ul class="list-unstyled">
           </ul>
    </div>
</div>
